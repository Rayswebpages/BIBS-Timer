<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Contest Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --text-dim: #888888;
            --color-warning: #ffeb3b;
            --color-danger: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 主显示区 */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .info-bar {
            font-size: 5vh;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2vh;
            display: flex;
            gap: 20px;
        }

        .student-type { color: var(--text-dim); }
        .phase-type { transition: color 0.3s; }

        .time-display {
            font-size: 45vh; /* 超大字体 */
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            line-height: 0.9;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        /* 警告状态动画 */
        @keyframes flashRed {
            0% { background-color: var(--bg-color); }
            50% { background-color: #3b0000; }
            100% { background-color: var(--bg-color); }
        }
        .time-up { animation: flashRed 1s infinite; color: var(--color-danger) !important; }

        /* 底部控制栏 */
        .controls {
            height: 12vh;
            background-color: #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-top: 2px solid #333;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.95); }

        .btn-default { background-color: #444; }
        .btn-primary { background-color: #2196f3; }
        .btn-success { background-color: #4caf50; }
        .btn-warning { background-color: #ff9800; }
        .btn-danger { background-color: #f44336; }

        select {
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            background-color: #333;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            max-width: 300px;
        }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-header { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.5rem; }
        .modal-body { overflow-y: auto; flex: 1; padding-right: 10px; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 25px; }
        .settings-col h3, .settings-durations h3 { border-bottom: 1px solid #555; padding-bottom: 8px; margin-bottom: 15px; color: #aaa;}
        
        .dynamic-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .dynamic-row input { flex: 1; padding: 10px; font-size: 1rem; background: #1e1e1e; border: 1px solid #555; color: white; border-radius: 6px; }
        .btn-outline { background: transparent; border: 1px dashed #888; color: #aaa; width: 100%; padding: 10px; cursor: pointer; border-radius: 6px; text-align: center; }
        .btn-outline:hover { background: #333; color: white; border-color: white; }
        .btn-sm { padding: 10px 15px; font-size: 1rem; }

        .duration-card { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; }
        .duration-card h4 { margin-bottom: 15px; color: var(--text-main); font-size: 1.2rem;}
        .dur-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1.1rem; }
        .dur-row input { width: 70px; text-align: center; padding: 8px; font-size: 1.1rem; background: #1e1e1e; border: 1px solid #555; color: white; border-radius: 6px;}
        
        .sound-row { display: flex; justify-content: space-between; align-items: center; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #444; }
    </style>
</head>
<body>

    <!-- 主展示区 -->
    <div class="display-container" id="displayContainer">
        <div class="info-bar">
            <span class="student-type" id="categoryDisplay">Category</span>
            <span>|</span>
            <span class="phase-type" id="phaseDisplay">Phase</span>
        </div>
        <div class="time-display" id="timeDisplay">00:00</div>
    </div>

    <!-- 底部控制栏 -->
    <div class="controls">
        <div class="control-group">
            <select id="categorySelect"></select>
            <select id="phaseSelect"></select>
        </div>

        <div class="control-group">
            <button class="btn-success" id="startBtn">Start</button>
            <button class="btn-warning" id="pauseBtn" style="display: none;">Pause</button>
            <button class="btn-primary" id="nextPhaseBtn">Next Phase ➔</button>
            <button class="btn-danger" id="resetBtn">Reset</button>
        </div>

        <div class="control-group">
            <button class="btn-default" id="settingsBtn">⚙️ Settings</button>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">⚙️ Contest Configuration</div>
            
            <div class="modal-body">
                <div class="settings-grid">
                    <!-- Categories -->
                    <div class="settings-col">
                        <h3>Categories (Students)</h3>
                        <div id="settingsCategories"></div>
                        <button id="addCatBtn" class="btn-outline">+ Add Category</button>
                    </div>
                    <!-- Phases -->
                    <div class="settings-col">
                        <h3>Contest Phases</h3>
                        <div id="settingsPhases"></div>
                        <button id="addPhaseBtn" class="btn-outline">+ Add Phase</button>
                    </div>
                </div>

                <!-- Durations -->
                <div class="settings-durations">
                    <h3>Durations Configuration</h3>
                    <div id="settingsDurations"></div>
                </div>

                <!-- 音频设置 -->
                <div class="settings-durations" style="margin-top: 25px;">
                    <h3>Alarm Sound Configuration</h3>
                    <div class="duration-card sound-row">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span id="audioFileName" style="color: var(--color-warning); font-weight: bold;">Default Beep Sound</span>
                            
                            <label for="audioUpload" class="btn-outline btn-sm" style="display: inline-block; cursor: pointer; margin: 0; width: auto;">
                                📁 Upload Custom Audio
                            </label>
                            <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
                            
                            <button class="btn-danger btn-sm" id="removeAudioBtn" style="display: none;">✕ Remove</button>
                        </div>
                        <button class="btn-success btn-sm" id="testAudioBtn">▶ Test Sound</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-default" id="cancelSettingsBtn">Cancel</button>
                <button class="btn-success" id="saveSettingsBtn">Save & Apply</button>
            </div>
        </div>
    </div>

    <script>
        // 核心数据结构与默认配置
        let appData = {
            categories: ['Literature Student', 'Language Acq. Student'],
            phases: ['Thinking Time', 'Speech Time'],
            durations: {
                '0-0': 60,   // Lit - Think
                '0-1': 180,  // Lit - Speech
                '1-0': 60,   // Lang - Think
                '1-1': 150   // Lang - Speech
            }
        };

        const phaseColors =['#00bcd4', '#4caf50', '#9c27b0', '#e91e63', '#ff9800'];

        let draftData = {}; 
        let currentCatIndex = 0;
        let currentPhaseIndex = 0;
        
        let timeLeft = 0;
        let timerInterval = null;
        let isRunning = false;

        // 音频相关变量
        let useCustomAudio = false;
        let customAudioElement = new Audio();
        let alarmHasPlayed = false;

        // DOM 元素
        const timeDisplay = document.getElementById('timeDisplay');
        const phaseDisplay = document.getElementById('phaseDisplay');
        const categoryDisplay = document.getElementById('categoryDisplay');
        const displayContainer = document.getElementById('displayContainer');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const nextPhaseBtn = document.getElementById('nextPhaseBtn');
        
        const categorySelect = document.getElementById('categorySelect');
        const phaseSelect = document.getElementById('phaseSelect');

        // 初始化主程序
        function init() {
            updateMainSelects();
            updateTimeLeft();
            renderMain();
        }

        // --- 音频引擎逻辑 ---
        
        // 1. 纯代码生成数字蜂鸣音（完全断网可用）
        function playDefaultBeep() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            
            function beep(startTime) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.type = 'square'; // 更有闹钟质感的波形
                osc.frequency.setValueAtTime(800, startTime);
                
                gain.gain.setValueAtTime(1, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
                
                osc.start(startTime);
                osc.stop(startTime + 0.2);
            }

            // 播放连续的三声滴滴滴
            beep(ctx.currentTime);
            beep(ctx.currentTime + 0.3);
            beep(ctx.currentTime + 0.6);
        }

        // 2. 触发报警音
        function triggerAlarm() {
            if (useCustomAudio && customAudioElement.src) {
                customAudioElement.currentTime = 0;
                customAudioElement.play().catch(e => console.log("Audio play blocked", e));
            } else {
                playDefaultBeep();
            }
        }

        // 3. 停止自定义音频
        function stopAlarm() {
            if (useCustomAudio && customAudioElement) {
                customAudioElement.pause();
                customAudioElement.currentTime = 0;
            }
        }


        function updateMainSelects() {
            categorySelect.innerHTML = appData.categories.map((c, i) => `<option value="${i}">${c}</option>`).join('');
            phaseSelect.innerHTML = appData.phases.map((p, i) => `<option value="${i}">${p}</option>`).join('');
            
            categorySelect.value = currentCatIndex;
            phaseSelect.value = currentPhaseIndex;
        }

        // 倒计时逻辑
        function startTimer() {
            if (isRunning || timeLeft <= 0) return;
            isRunning = true;
            alarmHasPlayed = false;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            displayContainer.classList.remove('time-up');

            timerInterval = setInterval(() => {
                timeLeft--;
                renderMain();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    startBtn.style.display = 'inline-block';
                    pauseBtn.style.display = 'none';
                    displayContainer.classList.add('time-up');
                    
                    // 触发音效 (只触发一次)
                    if (!alarmHasPlayed) {
                        triggerAlarm();
                        alarmHasPlayed = true;
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            pauseTimer();
            stopAlarm(); // 重置时停止声音
            displayContainer.classList.remove('time-up');
            updateTimeLeft();
            renderMain();
        }

        function updateTimeLeft() {
            let key = `${currentCatIndex}-${currentPhaseIndex}`;
            timeLeft = appData.durations[key] || 0;
        }

        // 渲染主界面视觉
        function renderMain() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            categoryDisplay.textContent = appData.categories[currentCatIndex] || 'N/A';
            phaseDisplay.textContent = appData.phases[currentPhaseIndex] || 'N/A';

            const basePhaseColor = phaseColors[currentPhaseIndex % phaseColors.length];
            phaseDisplay.style.color = basePhaseColor;

            if (timeLeft <= 10 && timeLeft > 0) {
                timeDisplay.style.color = 'var(--color-danger)';
            } else if (timeLeft <= 30 && timeLeft > 0) {
                timeDisplay.style.color = 'var(--color-warning)';
            } else if (timeLeft === 0) {
                timeDisplay.style.color = 'var(--color-danger)';
            } else {
                timeDisplay.style.color = 'var(--text-main)';
            }
        }

        // 主控制栏事件
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        nextPhaseBtn.addEventListener('click', () => {
            stopAlarm(); // 切换阶段时停止声音
            currentPhaseIndex = (currentPhaseIndex + 1) % appData.phases.length;
            phaseSelect.value = currentPhaseIndex;
            resetTimer();
        });

        categorySelect.addEventListener('change', (e) => {
            currentCatIndex = parseInt(e.target.value);
            resetTimer();
        });

        phaseSelect.addEventListener('change', (e) => {
            currentPhaseIndex = parseInt(e.target.value);
            resetTimer();
        });

        /* ================= 设置面板与音频上传逻辑 ================= */
        const settingsModal = document.getElementById('settingsModal');
        const audioUpload = document.getElementById('audioUpload');
        const audioFileName = document.getElementById('audioFileName');
        const removeAudioBtn = document.getElementById('removeAudioBtn');
        const testAudioBtn = document.getElementById('testAudioBtn');

        // 音频文件选择事件
        audioUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                customAudioElement.src = url;
                useCustomAudio = true;
                audioFileName.textContent = `🎵 ${file.name}`;
                removeAudioBtn.style.display = 'inline-block';
            }
        });

        // 移除自定义音频
        removeAudioBtn.addEventListener('click', () => {
            useCustomAudio = false;
            customAudioElement.src = '';
            audioUpload.value = '';
            audioFileName.textContent = 'Default Beep Sound';
            removeAudioBtn.style.display = 'none';
        });

        // 测试音频
        testAudioBtn.addEventListener('click', () => {
            triggerAlarm();
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            draftData = JSON.parse(JSON.stringify(appData));
            renderSettingsUI();
            pauseTimer();
            settingsModal.style.display = 'flex';
        });

        document.getElementById('cancelSettingsBtn').addEventListener('click', () => {
            settingsModal.style.display = 'none';
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            syncSettingsToDraft();
            appData = JSON.parse(JSON.stringify(draftData));
            
            if(currentCatIndex >= appData.categories.length) currentCatIndex = 0;
            if(currentPhaseIndex >= appData.phases.length) currentPhaseIndex = 0;
            
            init();
            settingsModal.style.display = 'none';
        });

        function syncSettingsToDraft() {
            const catInputs = document.querySelectorAll('.input-cat');
            const phaseInputs = document.querySelectorAll('.input-phase');
            
            if(catInputs.length) draftData.categories = Array.from(catInputs).map(i => i.value);
            if(phaseInputs.length) draftData.phases = Array.from(phaseInputs).map(i => i.value);

            draftData.categories.forEach((cat, cIdx) => {
                draftData.phases.forEach((p, pIdx) => {
                    const mInput = document.getElementById(`dur-m-${cIdx}-${pIdx}`);
                    const sInput = document.getElementById(`dur-s-${cIdx}-${pIdx}`);
                    if(mInput && sInput) {
                        let m = parseInt(mInput.value) || 0;
                        let s = parseInt(sInput.value) || 0;
                        draftData.durations[`${cIdx}-${pIdx}`] = m * 60 + s;
                    }
                });
            });
        }

        function renderSettingsUI() {
            const catContainer = document.getElementById('settingsCategories');
            const phaseContainer = document.getElementById('settingsPhases');
            const durContainer = document.getElementById('settingsDurations');

            catContainer.innerHTML = draftData.categories.map((c, i) => `
                <div class="dynamic-row">
                    <input type="text" class="input-cat" value="${c}" onchange="window.refreshMatrix()">
                    <button class="btn-danger btn-sm" onclick="window.removeCategory(${i})">✕</button>
                </div>
            `).join('');

            phaseContainer.innerHTML = draftData.phases.map((p, i) => `
                <div class="dynamic-row">
                    <input type="text" class="input-phase" value="${p}" onchange="window.refreshMatrix()">
                    <button class="btn-danger btn-sm" onclick="window.removePhase(${i})">✕</button>
                </div>
            `).join('');

            durContainer.innerHTML = draftData.categories.map((cat, cIdx) => `
                <div class="duration-card">
                    <h4>❖ ${cat}</h4>
                    ${draftData.phases.map((p, pIdx) => {
                        let totalSec = draftData.durations[`${cIdx}-${pIdx}`] || 0;
                        let m = Math.floor(totalSec / 60);
                        let s = totalSec % 60;
                        return `
                            <div class="dur-row">
                                <span style="color:${phaseColors[pIdx % phaseColors.length]}">${p}</span>
                                <div>
                                    <input type="number" id="dur-m-${cIdx}-${pIdx}" min="0" value="${m}" onchange="syncSettingsToDraft()"> m
                                    <input type="number" id="dur-s-${cIdx}-${pIdx}" min="0" max="59" value="${s}" onchange="syncSettingsToDraft()"> s
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `).join('');
        }

        window.refreshMatrix = function() {
            syncSettingsToDraft();
            renderSettingsUI();
        };

        window.removeCategory = function(index) {
            syncSettingsToDraft();
            if(draftData.categories.length <= 1) return alert("You must have at least 1 category.");
            draftData.categories.splice(index, 1);
            
            let newDurations = {};
            draftData.categories.forEach((cat, cIdx) => {
                let oldCIdx = cIdx >= index ? cIdx + 1 : cIdx;
                draftData.phases.forEach((p, pIdx) => {
                    newDurations[`${cIdx}-${pIdx}`] = draftData.durations[`${oldCIdx}-${pIdx}`] || 0;
                });
            });
            draftData.durations = newDurations;
            renderSettingsUI();
        };

        window.removePhase = function(index) {
            syncSettingsToDraft();
            if(draftData.phases.length <= 1) return alert("You must have at least 1 phase.");
            draftData.phases.splice(index, 1);
            
            let newDurations = {};
            draftData.categories.forEach((cat, cIdx) => {
                draftData.phases.forEach((p, pIdx) => {
                    let oldPIdx = pIdx >= index ? pIdx + 1 : pIdx;
                    newDurations[`${cIdx}-${pIdx}`] = draftData.durations[`${cIdx}-${oldPIdx}`] || 0;
                });
            });
            draftData.durations = newDurations;
            renderSettingsUI();
        };

        document.getElementById('addCatBtn').addEventListener('click', () => {
            syncSettingsToDraft();
            draftData.categories.push('New Category');
            renderSettingsUI();
        });

        document.getElementById('addPhaseBtn').addEventListener('click', () => {
            syncSettingsToDraft();
            draftData.phases.push('New Phase');
            renderSettingsUI();
        });

        // 启动应用
        init();
    </script>
</body>
</html>
